# Forrestania REAL DATA joint inversion
# Uses observed data from SimPEG + LithoSeed pipeline (Steps 1-2)
# Contact meshes from LithoSeed as starting geometry
[data]
cluster_csv = inversion_output/cluster_properties.csv
group_column = cluster_id
real_data = true
observed_gravity_csv = inversion_output/gravity_local.csv
observed_magnetic_csv = inversion_output/magnetics_local.csv
contact_meshes = inversion_output/meshes/contact_1_2.ts,inversion_output/meshes/contact_2_3.ts,inversion_output/meshes/contact_3_4.ts
local_origin_x = 747019.39
local_origin_y = 6417259.75
z_datum = 381.2

[inversion]
max_iterations = 30
tolerance = 1e-5
lambda = 0.01
omega = 2.0
control_point_stride = 5
lbfgs_history = 20
vertex_freedom = z_only
fd_step = 10.0
armijo_c1 = 0.001
line_search_max_iter = 30
solver = lbfgsb
enable_eigenvalue_scaling = true
enable_property_inversion = true
property_inversion_interval = 5
property_inversion_max_iter = 10

[gravity]
density_min = -0.5
density_max = 0.5
gravity_uncertainty = 0.015

[magnetic]
magnetic_weight = 0.5
inclination = -66.2
declination = -0.1
field_nT = 58874.0
susceptibility_min = 0.0
susceptibility_max = 0.1
remanence_min = 0.0
remanence_max = 10.0
remanence_mode = effective_susceptibility

[topography]
mode = none
dem_file =
datum_elevation = 0.0
bouguer_density = 2.67
padding_rings = 0
padding_cell_size = 100.0
invert_halfspace_properties = false

[padding]
enable_padding_group = true
padding_density_initial = 2.68
padding_density_lower = 1.5
padding_density_upper = 5.0
padding_depth = -100000.0

[true_model]
mode = dipping
surface_depths = -50,-120,-250
dip_angle = 0
dip_direction = 90

[output]
output_dir = ./output_real
